name: Email Content Update

on:
  repository_dispatch:
    types: [email-update]

permissions:
  contents: write

jobs:
  create-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONTENT_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write content bundle
        env:
          SECTION: ${{ github.event.client_payload.section }}
          SLUG: ${{ github.event.client_payload.slug }}
          TITLE: ${{ github.event.client_payload.title }}
          DATE: ${{ github.event.client_payload.date }}
          BODY: ${{ github.event.client_payload.body }}
          SUMMARY: ${{ github.event.client_payload.summary }}
          EVENT_TYPE: ${{ github.event.client_payload.event_type }}
          SPEAKER: ${{ github.event.client_payload.speaker }}
          AFFILIATION: ${{ github.event.client_payload.affiliation }}
          TALK_TIME: ${{ github.event.client_payload.time }}
          LOCATION: ${{ github.event.client_payload.location }}
          ABSTRACT: ${{ github.event.client_payload.abstract }}
          ROLE: ${{ github.event.client_payload.role }}
          INTERESTS: ${{ github.event.client_payload.interests }}
          WEBSITE: ${{ github.event.client_payload.website }}
          IMAGE_URL: ${{ github.event.client_payload.image_url }}
          SENDER_EMAIL: ${{ github.event.client_payload.sender_email }}
          ALLOWED_SENDERS: ${{ secrets.ALLOWED_SENDERS }}
        run: node scripts/write-content.js

      - name: Commit and push
        run: |
          git config user.name "LUCI Bot"
          git config user.email "bot@luci.unimi.it"
          git add content/
          git diff --staged --quiet || git commit -m "content: add/update '${{ github.event.client_payload.title }}' via email"
          git push
