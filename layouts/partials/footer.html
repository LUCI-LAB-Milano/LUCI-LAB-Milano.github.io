<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <h3>{{ site.Title }}</h3>
      <p>{{ site.Params.description }}</p>
      <p>{{ site.Params.department }}<br>{{ site.Params.university }}</p>
    </div>
    <div>
      <h3>Contact</h3>
      <p><a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a><br>{{ site.Params.location }}</p>
    </div>
    <div>
      <h3>Sections</h3>
      <ul class="footer-links">
        {{ range site.Menus.main }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </div>
  </div>
</footer>
