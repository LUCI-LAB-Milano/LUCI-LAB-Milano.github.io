<div class="research-lightbox" id="research-lightbox" hidden aria-hidden="true">
  <div class="research-lightbox-backdrop" data-lightbox-close></div>
  <div class="research-lightbox-dialog" role="dialog" aria-modal="true" aria-label="Poster viewer">
    <button class="research-lightbox-close" type="button" aria-label="Close poster" data-lightbox-close>
      ×
    </button>
    <img
      class="research-lightbox-image"
      id="research-lightbox-image"
      src=""
      alt="">
  </div>
</div>

<script>
  (function () {
    const lightbox = document.getElementById('research-lightbox');
    const lightboxImage = document.getElementById('research-lightbox-image');
    const triggers = document.querySelectorAll('.js-research-lightbox-trigger');

    if (!lightbox || !lightboxImage || !triggers.length) return;

    function openLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt || 'Full poster';
      lightbox.hidden = false;
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.classList.add('research-lightbox-open');
    }

    function closeLightbox() {
      lightbox.hidden = true;
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      lightboxImage.alt = '';
      document.body.classList.remove('research-lightbox-open');
    }

    triggers.forEach(function (trigger) {
      trigger.addEventListener('click', function (event) {
        event.preventDefault();
        openLightbox(
          trigger.getAttribute('href'),
          trigger.getAttribute('data-lightbox-alt') || trigger.querySelector('img')?.alt || 'Full poster'
        );
      });
    });

    lightbox.addEventListener('click', function (event) {
      if (event.target.matches('[data-lightbox-close]')) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && !lightbox.hidden) {
        closeLightbox();
      }
    });
  })();
</script>
